[app]
data_db = "conf/state/auto_sync.sqlite"
log_dir = "logs"
status_log_interval_secs = 300
web_bind = "0.0.0.0:18765"
tcp_connection_pool_size = 100

[app.sync]
mirror = true
checksum = false
debug_logs = false
transfer_timeout_secs = 120
bwlimit_kbps = 0
max_parallel_transfers = 32
modify_window_secs = 1

[[machines]]
id = "local"
name = "local"
host = "0.0.0.0"
web_port = 18765
ssh_user = ""
ssh_port = 22
os = "linux"
enabled = true
manual = true

[[machines]]
id = "nas"
alias_name = "nas"
name = "tiger"
host = "192.168.2.247"
web_port = 18765
ssh_user = "root"
ssh_port = 10022
os = "linux"
enabled = true
manual = true

[[machines]]
id = "windows"
name = "DESKTOP-576IPE3"
host = "192.168.2.166"
web_port = 18765
ssh_user = "Administrator"
ssh_port = 22
os = "windows"
enabled = true
manual = true

[[machines]]
id = "openwrt"
name = "openwrt"
host = "192.168.2.1"
web_port = 18765
ssh_user = "root"
ssh_port = 10022
os = "linux"
enabled = true
manual = true

[[deploy.targets]]
id = "tiger"
host = "localhost"
port = 22
user = "root"
install_dir = "/usr/local/auto_sync"

[[deploy.targets]]
id = "nas"
host = "192.168.2.247"
port = 10022
user = "root"
install_dir = "/usr/local/auto_sync"

[[deploy.targets]]
id = "windows"
host = "192.168.3.7"
port = 22
user = "Administrator"
install_dir = "C:/auto_sync"

[[deploy.targets]]
id = "openwrt"
host = "192.168.2.1"
port = 10022
user = "root"
install_dir = "/usr/local/auto_sync"
