[app]
data_db = "conf/state/auto_sync.sqlite"
log_dir = "logs"
status_log_interval_secs = 300
port = 18765
tcp_connection_pool_size = 100

[app.sync]
mirror = true
checksum = false
debug_logs = false
transfer_timeout_secs = 120
bwlimit_kbps = 0
max_parallel_transfers = 32
modify_window_secs = 1

[[machines]]
id = "local"
name = "DESKTOP-576IPE3"
alias_name = "Windows"
host = "192.168.2.166"
port = 18765
ssh_user = ""
ssh_port = 22
os = "windows"
install_dir = "C:/auto_sync"
enabled = true
manual = true

[[machines]]
id = "nas"
alias_name = "nas"
name = "tiger"
host = "192.168.2.247"
port = 18765
ssh_user = "root"
ssh_port = 10022
os = "linux"
install_dir = "/opt/auto_sync"
enabled = true
manual = true

[[machines]]
id = "openwrt"
name = "openwrt"
host = "192.168.2.1"
port = 18765
ssh_user = "root"
ssh_port = 10022
os = "linux"
install_dir = "/usr/local/auto_sync"
enabled = true
manual = true

[[source_groups]]
id = "src_1"
src = '\\?\C:\Users\tiger\Documents\xwechat_files\Backup'
enabled = true
mode = "mirror"

[source_groups.snapshot]
backend = "auto"
prefix = "auto_sync"
reconcile_interval_secs = 900
keep_extra_cycles = 2

[[source_groups.destinations]]
id = "dst_1"
machine_id = "nas"
path = "/opt"
enabled = true

[source_groups.destinations.schedule]
mode = "realtime"
time = "02:00"
timezone = "local"
weekday = "monday"
sync_current_cycle_manually = false
