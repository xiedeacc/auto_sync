[[hosts]]
name = "aws"
hostname = "54.179.191.126"
user = "ubuntu"
port = 22
identity_file = "~/.ssh/id_ed25519"
root = 'D:\share\aws'
paths = [
    "/etc/nginx",
    "/etc/sysctl.d/99-shadowsocks-tune.conf",
    "/etc/systemd/system/rblog-backup.service",
    "/etc/systemd/system/rblog-backup.timer",
    "/etc/systemd/system/rblog.service",
    "/etc/systemd/system/shadowsocks-rust.service",
    "/etc/systemd/system/tbox_server.service",
    "/etc/systemd/system/vlmcsd.service",
    "/etc/systemd/system/waiwei.service",
    "/etc/systemd/system/xray.service",
    "/home/ubuntu/.acme.sh",
    "/home/ubuntu/.bashrc",
    "/home/ubuntu/.gitconfig",
