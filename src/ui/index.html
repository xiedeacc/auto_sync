<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>auto_sync</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <div>
      <h1>auto_sync</h1>
      <span id="config-path" class="subtle"></span>
    </div>
    <div class="toolbar">
      <button id="refresh" title="Refresh status">Refresh</button>
      <button id="sync" class="primary" title="Close current cycle and sync">Sync</button>
      <button id="save" class="primary" title="Save configuration">Save</button>
    </div>
  </header>

  <main>
    <section class="workspace">
      <div class="section-head">
        <h2>Sources</h2>
        <button id="add-source">Add Source</button>
      </div>

      <div class="schedule-row">
        <div>
          <label for="schedule-mode">Schedule</label>
          <select id="schedule-mode">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
          </select>
        </div>
        <div>
          <label for="schedule-time">Time</label>
          <input id="schedule-time" placeholder="02:00:00">
        </div>
        <div>
          <label for="schedule-weekday">Weekday</label>
          <input id="schedule-weekday" placeholder="monday">
        </div>
      </div>

      <div id="sources"></div>
      <div id="message" class="message"></div>
    </section>

    <aside>
      <div class="section-head">
        <h2>Destinations</h2>
        <span id="status-count" class="subtle"></span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Status</th>
            <th>Source</th>
            <th>Destination</th>
            <th>Cycle</th>
          </tr>
        </thead>
        <tbody id="status-body"></tbody>
      </table>
    </aside>
  </main>

  <script src="./main.js"></script>
</body>
</html>
