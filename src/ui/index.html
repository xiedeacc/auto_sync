<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>auto_sync</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <div>
      <h1>auto_sync</h1>
      <span id="config-path" class="subtle"></span>
    </div>
    <div class="toolbar">
      <button id="config" title="Show current configuration">Config</button>
      <button id="refresh" title="Refresh status">Refresh</button>
      <button id="save" class="primary" title="Save configuration">Save</button>
    </div>
  </header>

  <main>
    <section id="source-panel" class="panel"></section>

    <div id="message" class="message"></div>
  </main>

  <div id="folder-modal" class="modal" hidden>
    <div class="modal-panel">
      <div class="modal-head">
        <h2>Choose Folder</h2>
        <button id="folder-close" class="icon" title="Close">x</button>
      </div>
      <div class="folder-path" id="folder-path"></div>
      <div class="folder-actions">
        <button id="folder-up">Up</button>
        <button id="folder-select" class="primary">Select</button>
      </div>
      <div id="folder-list" class="folder-list"></div>
    </div>
  </div>

  <div id="schedule-modal" class="modal" hidden>
    <div class="modal-panel schedule-modal-panel">
      <div class="modal-head">
        <h2>Schedule</h2>
        <button id="schedule-close" class="icon" title="Close">x</button>
      </div>
      <div class="schedule-row" id="schedule-form">
        <div>
          <label for="cycle-mode">Schedule</label>
          <select id="cycle-mode">
            <option value="realtime">Realtime</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
          </select>
        </div>
        <div>
          <label for="cycle-time">Time</label>
          <input id="cycle-time" type="time" step="60" placeholder="02:00">
        </div>
        <div id="cycle-weekday-field">
          <label for="cycle-weekday">Weekday</label>
          <input id="cycle-weekday" placeholder="monday">
        </div>
      </div>
      <div class="folder-actions">
        <button id="schedule-apply" class="primary">Apply</button>
      </div>
    </div>
  </div>

  <div id="config-modal" class="modal" hidden>
    <div class="modal-panel config-modal-panel">
      <div class="modal-head">
        <h2>Config</h2>
        <button id="config-close" class="icon" title="Close">x</button>
      </div>
      <pre id="config-view" class="config-view"></pre>
    </div>
  </div>

  <script src="./main.js"></script>
</body>
</html>
